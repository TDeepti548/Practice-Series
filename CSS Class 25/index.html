<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Styling Lists</title>
    <style>
        nav ul li {
            /*list-style: none;*/
               list-style: devanagari;
               list-style-type: "😋";
            background-color: yellow;
            list-style-position: inside;
            border: solid black 2px;
            list-style-image: url();
             
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Homme</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
