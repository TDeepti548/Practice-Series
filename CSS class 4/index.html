<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element selector 
       /* class selector */
        .red{
            background-color: red;
        }
        /* ID selectors */
        #green{
            background-color: rgb(105, 170, 105);
        }
        /* child selectors */
        div >p {
            color: blue;
            background-color: brown;
        }
        /* Descendant selector */
        div >p {
            color: blue;
            background-color: brown;
        }
       /* unniversal selector */
        *{
            margin: 10;
            padding: 10;
        }
       /* Pseudo selector */
     a:visited{
        color: yellow;
     }
     a:link{
       background-color: pink;
     }
     a:active{
        background-color: red;
     }
     a:hover{
background-color: yellow;
     }
p:first-child {
    background-color: aqua;
}
    </style>
</head>
