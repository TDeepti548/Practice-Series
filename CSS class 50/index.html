<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Filters</title>
    <style>
        video{
           /* filter: blur(10px);*/
         /* filter: brightness(333%);*/
          height: 500px;
          width: 500px;
        }
        .img1{
          height: 500px;
          width: 500px;
          filter: opacity(0.6);
        }
        .img2{
            height: 500px;
            width: 500px;
         filter: grayscale(20%);
        }
    </style>
</head>
<body>
    <div class="container">
        <video src="videoplayback.mp4"> </video> </div>
       <img class="img1" src="pexels-life-of-pix-7974.jpg" alt="">
      <img class="img2" src="pexels-thisisengineering-3861964.jpg" alt="">
</body>
</html>
