<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
          /* box-shadow: 5px 5px 15px 5px  #09d847;*/
         /* box-shadow: inset 5px 15px 5px rgb(224, 9, 117);*/
         box-shadow: inset 5px 15px 5px rgba(12, 15, 197, 0.849);

        }
        .text-element {
         text-shadow: 2px 2px 4px #ed1717;
         outline: 2px solid black;
         border: 2px solid green;
         outline-offset: 8px;
         border-radius: 19px;
        }
    </style>
</head>
<body>
     <div class="box">
        I am a box
     </div>
     <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Non veniam quasi facilis atque doloribus totam aliquid. Illum omnis voluptatum sint earum maiores a nisi ut, magni facere praesentium quia quas. Facere illo repudiandae ex?

     </p>
</body>
</html>
